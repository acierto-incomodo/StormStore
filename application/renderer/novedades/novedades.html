<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novedades - StormStore</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="novedades.css" />
    <link rel="icon" type="image/png" href="../../assets/app.png" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand-container">
          <h2>StormStore</h2>
          <p class="version" id="app-version"></p>
        </div>

        <button id="back-to-apps" class="back-button">← Volver a aplicaciones</button>
        <ul id="categories"></ul>
      </div>

      <div class="sidebar-footer">
        <p class="studio">StormGamesStudios</p>
        <div class="footer-icons">
          <button id="open-updates">
            <img src="../../assets/icons/update.svg" alt="Actualizaciones" />
          </button>
          <button id="open-licenses">
            <img src="../../assets/icons/license.svg" alt="Licencias" />
          </button>
          <button id="open-info">
            <img src="../../assets/icons/info.svg" alt="Información" />
          </button>
          <button id="open-support" type="button">
            <img src="../../assets/icons/letter-svgrepo-com.svg" alt="Soporte" />
          </button>
          <button id="open-news" type="button" onclick="window.location.href='novedades.html'">
            <img src="../../assets/icons/notebook-minimalistic-svgrepo-com.svg" alt="Novedades" />
          </button>
        </div>
      </div>
    </aside>

    <main class="dashboard-layout">
      <div class="main-header">
        <h1>Novedades</h1>
        <div class="window-controls">
          <button class="control-btn" id="open-big-picture" title="StormVortex">
            <img src="../../assets/icons/stormvortex.svg" alt="StormVortex" class="window-control-icon" />
          </button>
          <button class="control-btn" id="open-settings-header" title="Ajustes">
            <img src="../../assets/icons/settings.svg" alt="Ajustes" class="window-control-icon" />
          </button>
          <button class="control-btn" id="min-btn">─</button>
          <button class="control-btn" id="max-btn">◻</button>
          <button class="control-btn close" id="close-btn">✕</button>
        </div>
      </div>

      <div class="releases-layout">
        <div class="releases-card animate-enter">
          <img src="../../assets/app.png" alt="Logo de la aplicación" class="app-logo" />
          <h1>Historial de novedades</h1>
          <p>Consulta los cambios publicados en las versiones de StormStore.</p>

          <div class="releases-toolbar">
            <div>
              <h2>Releases recientes</h2>
              <p>Se muestran los lanzamientos recientes desde GitHub.</p>
            </div>
            <button id="reload-btn" class="md-btn md-btn-filled">Actualizar</button>
          </div>

          <div id="status" class="status">Cargando release notes…</div>
          <div id="releases-list" class="releases-list"></div>
        </div>
      </div>
    </main>

    <script src="novedades.js"></script>
  </body>
</html>
