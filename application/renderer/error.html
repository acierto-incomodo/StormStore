<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #f8fafc;
      }

      .card {
        text-align: center;
        padding: 32px 40px;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.25);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        max-width: 560px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.8rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #cbd5e1;
      }

      .button {
        margin-top: 20px;
        display: inline-block;
        padding: 10px 18px;
        border-radius: 999px;
        background: #2563eb;
        color: white;
        text-decoration: none;
        font-weight: 600;
        transition: background 0.2s ease;
      }

      .button:hover {
        background: #1d4ed8;
      }
      .status {
        margin-top: 12px;
        color: #9ca3af;
        font-size: 0.9rem;
      }

      .countdown {
        margin-top: 8px;
        color: #fbbf24;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Página no disponible</h1>
      <p>Esta vista está desactivada en esta compilación.</p>
      <a class="button" href="index.html">Ir al inicio</a>
      <div id="countdown" class="countdown">Redirigiendo en 3 segundos...</div>
      <div id="status" class="status"></div>
    </div>
    <script>
      const countdownEl = document.getElementById("countdown");
      let remaining = 3;

      const timer = setInterval(() => {
        remaining -= 1;
        if (remaining > 0) {
          countdownEl.textContent = `Redirigiendo en ${remaining} segundo${remaining === 1 ? "" : "s"}...`;
        } else {
          clearInterval(timer);
          countdownEl.textContent = "Redirigiendo ahora...";
          window.location.href = "index.html";
        }
      }, 1000);

      // Intentar crear settings.json si no existe cuando el usuario llega aquí
      (async () => {
        try {
          if (window.api && typeof window.api.ensureSettingsFile === 'function') {
            const res = await window.api.ensureSettingsFile({ setFirstLaunchTrue: true });
            const statusEl = document.getElementById('status');
            if (res && res.created) {
              statusEl.textContent = 'Archivo settings.json generado.';
            } else {
              statusEl.textContent = 'Archivo settings.json ya existe.';
            }
          }
        } catch (e) {
          // no hacemos nada crítico si falla
        }
      })();
    </script>
  </body>
</html>
