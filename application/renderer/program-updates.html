<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de descargas - StormStore</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="../assets/app.png" />
    <style>
      .progress-card {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .details-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 16px;
      }
      .progress-section {
        margin-top: 12px;
      }
      #program-select {
        width: 100%;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: #fff;
      }
      .progress-bar {
        width: 100%;
        height: 16px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        overflow: hidden;
      }
      .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #fdd835, #ffffff);
        transition: width 150ms ease;
      }
      .badge-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        font-size: 0.9rem;
      }
      .status-line {
        display: grid;
        grid-template-columns: auto auto;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
      }
      .status-line strong {
        color: #fdd835;
      }
      .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      .button-group button {
        min-width: 180px;
      }
      .progress-meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand-container">
          <h2>StormStore</h2>
          <p class="version" id="app-version"></p>
        </div>

        <button id="back-to-apps" class="back-button">
          ← Volver a aplicaciones
        </button>

        <ul id="categories"></ul>
      </div>

      <div class="sidebar-footer">
        <p class="studio">StormGamesStudios</p>

        <div class="footer-icons">
          <button id="open-updates">
            <img src="../assets/icons/update.svg" alt="Actualizaciones" />
          </button>
          <button id="open-program-updates">
            <img src="../assets/icons/download.svg" alt="Descargas" />
          </button>
          <button id="open-licenses">
            <img src="../assets/icons/license.svg" alt="Licencias" />
          </button>
          <button id="open-info">
            <img src="../assets/icons/info.svg" alt="Información" />
          </button>
        </div>
      </div>
    </aside>

    <main class="dashboard-layout">
      <div class="main-header">
        <h1>Gestor de descargas</h1>
        <div class="window-controls">
          <button class="control-btn" id="open-big-picture" title="StormVortex">
            <img
              src="../assets/icons/stormvortex.svg"
              alt="StormVortex"
              style="width: 20px; height: 20px"
            />
          </button>
          <button class="control-btn" id="open-settings-header" title="Ajustes">
            <img
              src="../assets/icons/settings.svg"
              alt="Ajustes"
              style="width: 20px; height: 20px"
            />
          </button>
          <button class="control-btn" id="min-btn">─</button>
          <button class="control-btn" id="max-btn">◻</button>
          <button class="control-btn close" id="close-btn">✕</button>
        </div>
      </div>

      <div class="updates-container">
        <div class="update-section progress-card">
          <h2 id="title-text">Descargando...</h2>
          <p id="status-text">Iniciando descarga...</p>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>

          <div class="progress-meta">
            <div class="info-row">
              <span>Descargado</span>
              <strong id="downloaded-text">0 B</strong>
            </div>
            <div class="info-row">
              <span>Total</span>
              <strong id="total-text">-</strong>
            </div>
            <div class="info-row">
              <span>Velocidad</span>
              <strong id="speed-text">0 B/s</strong>
            </div>
          </div>
        </div>
      </div>

      <footer id="bp-footer-prompts"></footer>
    </main>

    <script src="program-updates.js"></script>
  </body>
</html>
