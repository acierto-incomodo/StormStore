<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Información del sistema - StormStore</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="../assets/app.png" />
  </head>

  <body>
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand-container">
          <h2>StormStore</h2>
          <p class="version" id="app-version"></p>
        </div>

        <button id="back-btn" class="back-button">← Volver</button>

        <ul id="categories"></ul>
      </div>

      <div class="sidebar-footer">
        <p class="studio">StormGamesStudios</p>

        <div class="footer-icons">
          <button data-link="https://github.com/acierto-incomodo">
            <img src="../assets/icons/github.svg" alt="GitHub" />
          </button>
          <button data-link="https://stormgamesstudios.vercel.app/">
            <img
              src="../assets/icons/web.svg"
              alt="Web"
              style="filter: invert(1)"
            />
          </button>
          <button data-link="https://www.curseforge.com/members/creper1125463">
            <img src="../assets/icons/curseforge.svg" alt="CurseForge" />
          </button>
          <button id="open-updates">
            <img src="../assets/icons/update.svg" alt="Actualizaciones" />
          </button>
          <button id="open-licenses">
            <img src="../assets/icons/license.svg" alt="Licencias" />
          </button>
          <button id="open-info">
            <img src="../assets/icons/info.svg" alt="Información" />
          </button>
        </div>
      </div>
    </aside>

    <main class="dashboard-layout">
      <div class="main-header">
        <h1>Información del sistema</h1>
        <div class="window-controls">
          <button class="control-btn" id="open-big-picture" title="StormVortex">
            <img
              src="../assets/icons/stormvortex.svg"
              alt="StormVortex"
              style="width: 20px; height: 20px"
            />
          </button>
          <button class="control-btn" id="open-settings-header" title="Ajustes">
            <img
              src="../assets/icons/settings.svg"
              alt="Ajustes"
              style="width: 20px; height: 20px"
            />
          </button>
          <button class="control-btn" id="min-btn">─</button>
          <button class="control-btn" id="max-btn">◻</button>
          <button class="control-btn close" id="close-btn">✕</button>
        </div>
      </div>

      <div class="updates-container" id="system-info-content">
        <div class="update-section animate-enter" style="animation-delay: 0.1s; text-align: center;">
          <img
            src="../assets/app.png"
            alt="StormStore Logo"
            style="width: 96px; height: 96px; margin-bottom: 10px"
          />
          <h2
            style="margin: 0; font-size: 24px; color: var(--md-sys-color-primary);"
          >
            Información del sistema
          </h2>
          <p
            class="version"
            id="info-version"
            style="font-size: 14px; margin-top: 5px"
          >
            Cargando datos del sistema...
          </p>
        </div>
      </div>
    </main>

    <script>
      function formatValue(value) {
        if (value === null) return "null";
        if (value === undefined) return "—";
        if (typeof value === "boolean") return value ? "Sí" : "No";
        if (typeof value === "number") return value.toString();
        if (Array.isArray(value)) return value.length ? value.join(", ") : "[]";
        if (typeof value === "object") return JSON.stringify(value, null, 2);
        return String(value);
      }

      function createDetailsBlock(title, content) {
        const section = document.createElement("div");
        section.className = "update-section animate-enter";
        section.style.animationDelay = "0.2s";

        const heading = document.createElement("h2");
        heading.textContent = title;
        section.appendChild(heading);

        if (!content || content.status === "error") {
          const message = document.createElement("p");
          message.textContent = content?.error || "No se pudo obtener la información.";
          section.appendChild(message);
          return section;
        }

        const details = document.createElement("div");
        details.style.display = "grid";
        details.style.gridTemplateColumns = "repeat(auto-fit, minmax(280px, 1fr))";
        details.style.gap = "16px";

        const data = content.data;
        Object.keys(data).forEach((key) => {
          const field = document.createElement("div");
          field.style.background = "var(--md-sys-color-surface-container)";
          field.style.borderRadius = "16px";
          field.style.padding = "16px";
          field.style.border = "1px solid rgba(255,255,255,0.08)";

          const label = document.createElement("strong");
          label.textContent = key.replace(/_/g, " ");
          label.style.display = "block";
          label.style.marginBottom = "8px";
          field.appendChild(label);

          const value = document.createElement("pre");
          value.textContent = formatValue(data[key]);
          value.style.margin = "0";
          value.style.whiteSpace = "pre-wrap";
          value.style.wordBreak = "break-word";
          value.style.fontFamily = "Roboto, system-ui, sans-serif";
          field.appendChild(value);

          details.appendChild(field);
        });

        section.appendChild(details);
        return section;
      }

      async function loadSystemInformation() {
        const version = await window.api.getAppVersion();
        document.getElementById("app-version").textContent = `v${version}`;
        document.getElementById("info-version").textContent = `Versión ${version}`;

        const container = document.getElementById("system-info-content");
        container.innerHTML = "";

        const loading = document.createElement("div");
        loading.className = "update-section animate-enter";
        loading.style.animationDelay = "0.1s";
        const loadingText = document.createElement("p");
        loadingText.textContent = "Obteniendo información del sistema...";
        loading.appendChild(loadingText);
        container.appendChild(loading);

        const result = await window.api.getSystemInformation();
        container.innerHTML = "";

        container.appendChild(createDetailsBlock("Sistema", result.system));
        container.appendChild(createDetailsBlock("SO", result.osInfo));
        container.appendChild(createDetailsBlock("CPU", result.cpu));
        container.appendChild(createDetailsBlock("Memoria", result.mem));
        container.appendChild(createDetailsBlock("Discos", result.diskLayout));
        container.appendChild(createDetailsBlock("Archivos del sistema", result.fsSize));
        container.appendChild(createDetailsBlock("Red", result.networkInterfaces));
        container.appendChild(createDetailsBlock("Batería", result.battery));
        container.appendChild(createDetailsBlock("Gráficos", result.graphics));
      }

      document.addEventListener("DOMContentLoaded", () => {
        loadSystemInformation();

        document.getElementById("back-btn").addEventListener("click", () => {
          window.location.href = "settings.html";
        });

        document
          .querySelectorAll(".footer-icons button[data-link]")
          .forEach((btn) => {
            btn.addEventListener("click", () => {
              const url = btn.getAttribute("data-link");
              window.open(url);
            });
          });

        document
          .getElementById("open-updates")
          ?.addEventListener("click", () => {
            window.location.href = "updates.html";
          });
        document
          .getElementById("open-licenses")
          ?.addEventListener("click", () => {
            window.location.href = "licencias.html";
          });
        document
          .getElementById("open-info")
          ?.addEventListener("click", () => {
            window.location.href = "info.html";
          });
        document
          .getElementById("open-settings-header")
          ?.addEventListener("click", () => {
            window.location.href = "settings.html";
          });

        document
          .getElementById("open-big-picture")
          ?.addEventListener("click", () => window.api.openBigPicture());

        document
          .getElementById("min-btn")
          ?.addEventListener("click", () => window.api.minimizeWindow());
        document
          .getElementById("close-btn")
          ?.addEventListener("click", () => window.api.closeWindow());

        const maxBtn = document.getElementById("max-btn");
        if (maxBtn) {
          maxBtn.addEventListener("click", () => window.api.maximizeWindow());
          window.api.isMaximized().then((isMax) => {
            if (isMax) maxBtn.textContent = "❐";
          });
          window.api.onWindowMaximized(() => (maxBtn.textContent = "❐"));
          window.api.onWindowRestored(() => (maxBtn.textContent = "◻"));
        }
      });
    </script>
  </body>
</html>
